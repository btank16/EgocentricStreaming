apply plugin: 'expo-module-gradle-plugin'

group = 'expo.modules.xrandroid'
version = '0.0.0'

android {
  namespace "expo.modules.xrandroid"
  defaultConfig {
    versionCode 1
    versionName '0.0.0'
    // Ship XR keep rules to the consuming app. R8 runs at the app module (the
    // consuming app's android project, generated by `expo prebuild`); consumer ProGuard
    // rules from this AAR are merged into that pass automatically, so this
    // survives prebuild without a custom Expo config plugin.
    consumerProguardFiles 'proguard-rules.pro'
  }
}

// Jetpack XR SDK dependencies.
// These live in the native module (not the consuming app's android project, which is
// generated by `expo prebuild` and git-ignored). Expo autolinking propagates these
// `implementation` deps into the final app at build time.
// Docs: https://developer.android.com/develop/xr/jetpack-xr-sdk/set-up-sdk#add-dependencies
dependencies {
  // ── Shared across all XR surfaces (headsets, XR glasses, AI glasses) ──
  implementation "androidx.xr.runtime:runtime:1.0.0-alpha15"   // Core XR runtime
  implementation "androidx.xr.arcore:arcore:1.0.0-alpha15"     // Perception: planes, anchors, hand/face tracking

  // ── Immersive — XR headsets & XR glasses ──
  implementation "androidx.xr.scenecore:scenecore:1.0.0-alpha16"          // 3D scene management
  implementation "androidx.xr.compose:compose:1.0.0-alpha15"             // Spatial UI with Compose
  implementation "androidx.xr.compose.material3:material3:1.0.0-alpha17" // Material Design for XR

  // ── Augmented — AI glasses ──
  // TEMPORARILY DISABLED: these three pull in androidx.compose:1.12.0-alpha03 and
  // androidx.core:1.19.0-alpha02, which require compileSdk 37 + Android Gradle
  // Plugin 9.1.0. Expo SDK 56 / RN 0.85 ship compileSdk 36 / AGP 8.12.0, so
  // `checkDebugAarMetadata` fails the build (20 issues). The immersive headset
  // stack above is unaffected. Re-enable once the Expo/RN toolchain supports
  // compileSdk 37 + AGP 9 (or override via expo-build-properties).
  // implementation "androidx.xr.glimmer:glimmer:1.0.0-alpha13"              // UI components for glasses
  // implementation "androidx.xr.glimmer:glimmer-google-fonts:1.0.0-alpha13" // Glimmer Google Fonts support
  // implementation "androidx.xr.projected:projected:1.0.0-alpha08"         // Hardware access / projected context

  // ── Optional — code minification (R8/ProGuard) support ──
  // Required to enable R8/ProGuard with Jetpack XR (alpha05+). Provided by the
  // device's XR system at runtime, so it MUST be `compileOnly` — using
  // `implementation`/`api` packages it into the APK and breaks at runtime.
  // Keep rules for it live in proguard-rules.pro (see consumerProguardFiles above).
  compileOnly "com.android.extensions.xr:extensions-xr:1.3.0"
}
